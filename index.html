<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<OfficeApp
  xmlns="http://schemas.microsoft.com/office/appforoffice/1.1"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xmlns:bt="http://schemas.microsoft.com/office/officeappbasictypes/1.0"
  xmlns:mailappor="http://schemas.microsoft.com/office/mailappversionoverrides/1.0"
  xsi:type="MailApp">

  <Id>a1b2c3d4-e5f6-7890-abcd-ef1234567890</Id>
  <Version>1.0.0.0</Version>
  <ProviderName>Steakhouse Bahnhof</ProviderName>
  <DefaultLocale>de-DE</DefaultLocale>
  <DisplayName DefaultValue="E-Mail Kanban"/>
  <Description DefaultValue="E-Mails als Kanban-Board direkt in Outlook verwalten"/>
  <IconUrl DefaultValue="https://oli39.github.io/outlook-kanban/icon64.png"/>
  <HighResolutionIconUrl DefaultValue="https://oli39.github.io/outlook-kanban/icon128.png"/>
  <SupportUrl DefaultValue="https://oli39.github.io"/>
  <AppDomains>
    <AppDomain>https://oli39.github.io</AppDomain>
  </AppDomains>

  <Hosts>
    <Host Name="Mailbox"/>
  </Hosts>

  <Requirements>
    <Sets>
      <Set Name="Mailbox" MinVersion="1.3"/>
    </Sets>
  </Requirements>

  <FormSettings>
    <Form xsi:type="ItemRead">
      <DesktopSettings>
        <SourceLocation DefaultValue="https://oli39.github.io/outlook-kanban/index.html"/>
        <RequestedHeight>450</RequestedHeight>
      </DesktopSettings>
    </Form>
  </FormSettings>

  <Permissions>ReadWriteMailbox</Permissions>

  <WebApplicationInfo>
    <Id>d3590ed6-52b3-4102-aeff-aad2292ab01c</Id>
    <Resource>https://graph.microsoft.com</Resource>
    <Scopes>
      <Scope>Files.ReadWrite</Scope>
      <Scope>Sites.ReadWrite.All</Scope>
    </Scopes>
  </WebApplicationInfo>

  <Rule xsi:type="RuleCollection" Mode="Or">
    <Rule xsi:type="ItemIs" ItemType="Message" FormType="Read"/>
  </Rule>

  <DisableEntityHighlighting>false</DisableEntityHighlighting>

  <VersionOverrides xmlns="http://schemas.microsoft.com/office/mailappversionoverrides" xsi:type="VersionOverridesV1_0">
    <Requirements>
      <bt:Sets DefaultMinVersion="1.3">
        <bt:Set Name="Mailbox"/>
      </bt:Sets>
    </Requirements>

    <Hosts>
      <Host xsi:type="MailHost">
        <DesktopFormFactor>
          <ExtensionPoint xsi:type="MessageReadCommandSurface">
            <OfficeTab id="TabDefault">
              <Group id="msgReadGroup">
                <Label resid="groupLabel"/>
                <Control xsi:type="Button" id="msgReadOpenPaneButton">
                  <Label resid="paneReadButtonLabel"/>
                  <Supertip>
                    <Title resid="paneReadSuperTipTitle"/>
                    <Description resid="paneReadSuperTipDescription"/>
                  </Supertip>
                  <Icon>
                    <bt:Image size="16" resid="icon16"/>
                    <bt:Image size="32" resid="icon32"/>
                    <bt:Image size="80" resid="icon80"/>
                  </Icon>
                  <Action xsi:type="ShowTaskpane">
                    <SourceLocation resid="paneReadUrl"/>
                  </Action>
                </Control>
              </Group>
            </OfficeTab>
          </ExtensionPoint>
        </DesktopFormFactor>
      </Host>
    </Hosts>

    <Resources>
      <bt:Images>
        <bt:Image id="icon16" DefaultValue="https://oli39.github.io/outlook-kanban/icon16.png"/>
        <bt:Image id="icon32" DefaultValue="https://oli39.github.io/outlook-kanban/icon32.png"/>
        <bt:Image id="icon80" DefaultValue="https://oli39.github.io/outlook-kanban/icon80.png"/>
      </bt:Images>
      <bt:Urls>
        <bt:Url id="paneReadUrl" DefaultValue="https://oli39.github.io/outlook-kanban/index.html"/>
      </bt:Urls>
      <bt:ShortStrings>
        <bt:String id="groupLabel" DefaultValue="Kanban"/>
        <bt:String id="paneReadButtonLabel" DefaultValue="Kanban oeffnen"/>
        <bt:String id="paneReadSuperTipTitle" DefaultValue="E-Mail Kanban"/>
      </bt:ShortStrings>
      <bt:LongStrings>
        <bt:String id="paneReadSuperTipDescription" DefaultValue="Oeffnet das E-Mail Kanban-Board"/>
      </bt:LongStrings>
    </Resources>

  </VersionOverrides>

</OfficeApp>
